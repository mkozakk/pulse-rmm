x-app-deps: &app-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  minio:
    condition: service_healthy

networks:
  public:
  gateway:
  private:

services:
  api-gateway:
    build:
      context: ..
      dockerfile: backend/api-gateway/Dockerfile
    environment:
      PULSE_COOKIE_SECURE: "false"
      IDENTITY_SERVICE_URL: http://identity-service:8083
      ENDPOINT_SERVICE_URL: http://endpoint-service:8081
      METRIC_SERVICE_URL: http://metric-service:8082
      COMMANDS_SERVICE_URL: http://commands-service:8084
      ALERT_SERVICE_URL: http://alert-service:8087
      AUDIT_SERVICE_URL: http://audit-service:8088
      INTEGRATION_SERVICE_URL: http://integration-service:8091
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      PULSE_MTLS_ENABLED: ${PULSE_MTLS_ENABLED:-false}
      PULSE_CA_URL: http://ca-service:8089
    volumes:
      - api_gateway_tls:/var/lib/api-gateway/tls
    networks:
      - gateway
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps
      ca-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      endpoint-service:
        condition: service_healthy
      metric-service:
        condition: service_healthy
      commands-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy

  identity-service:
    build:
      context: ..
      dockerfile: backend/identity-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  endpoint-service:
    build:
      context: ..
      dockerfile: backend/endpoint-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:8083
      GATEWAY_URL: http://api-gateway:8080
      PULSE_CA_ENABLED: "true"
      PULSE_CA_URL: http://ca-service:8089
      TURN_SECRET: ${TURN_SECRET}
      TURN_URLS: ${TURN_URLS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      PULSE_API_URL: ${PULSE_API_URL}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  metric-service:
    build:
      context: ..
      dockerfile: backend/metric-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  commands-service:
    build:
      context: ..
      dockerfile: backend/commands-service/Dockerfile
    environment:
      SERVICE_PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_URL: http://api-gateway:8080
      SCRIPT_SERVICE_BASE_URL: http://commands-service:8084
      SCRIPT_SECRET_KEK: ${SCRIPT_SECRET_KEK}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  alert-service:
    build:
      context: ..
      dockerfile: backend/alert-service/Dockerfile
    environment:
      SERVICE_PORT: 8087
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ..
      dockerfile: backend/audit-service/Dockerfile
    environment:
      SERVICE_PORT: 8088
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  integration-service:
    build:
      context: ..
      dockerfile: backend/integration-service/Dockerfile
    environment:
      SERVICE_PORT: 8091
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WEBHOOK_SECRET_KEK: ${WEBHOOK_SECRET_KEK}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  ca-service:
    build:
      context: ..
      dockerfile: backend/ca-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CA_ROOT_KEY_SECRET: ${CA_ROOT_KEY_SECRET}
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8089/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  coturn:
    image: docker.io/coturn/coturn:4.6.2
    command: >-
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=pulse.local
      --no-tls
      --no-dtls
      --min-port=49152
      --max-port=49200
    networks:
      - public
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"

  nginx:
    image: docker.io/library/nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks:
      - public
      - gateway
    ports:
      - "8080:80"
      - "9090:9090"
    depends_on:
      api-gateway:
        condition: service_healthy

  postgres:
    image: docker.io/timescale/timescaledb:2.14.1-pg16
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 3

  redis:
    image: docker.io/library/redis:7.0-alpine
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3

  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      HOME: /tmp
    networks:
      - private
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    volumes:
      - minio_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 3

  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - private
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASSWORD &&
      mc mb --ignore-existing local/pulse-agent-binaries &&
      mc anonymous set download local/pulse-agent-binaries &&
      mc cors set local/pulse-agent-binaries --allowed-origin '*' --allowed-method 'PUT,GET' --allowed-header '*'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  api_gateway_tls:
