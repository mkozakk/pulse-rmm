x-obs-env: &obs-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev,loki}
  PULSE_LOKI_URL: http://loki:3100/loki/api/v1/push
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
  MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces

x-app-deps: &app-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  minio:
    condition: service_healthy

networks:
  public:
  gateway:
  private:

services:
  api-gateway:
    build:
      context: ..
      dockerfile: backend/api-gateway/Dockerfile
    environment:
      <<: *obs-env
      PULSE_COOKIE_SECURE: "false"
      IDENTITY_SERVICE_URL: http://identity-service:8083
      ENDPOINT_SERVICE_URL: http://endpoint-service:8081
      METRIC_SERVICE_URL: http://metric-service:8082
      COMMANDS_SERVICE_URL: http://commands-service:8084
      ALERT_SERVICE_URL: http://alert-service:8087
      AUDIT_SERVICE_URL: http://audit-service:8088
      INTEGRATION_SERVICE_URL: http://integration-service:8091
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      PULSE_MTLS_ENABLED: ${PULSE_MTLS_ENABLED:-true}
      PULSE_CA_URL: http://ca-service:8089
    volumes:
      - api_gateway_tls:/var/lib/api-gateway/tls
    networks:
      - gateway
      - private
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps
      ca-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      endpoint-service:
        condition: service_healthy
      metric-service:
        condition: service_healthy
      commands-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy

  identity-service:
    build:
      context: ..
      dockerfile: backend/identity-service/Dockerfile
    environment:
      <<: *obs-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  endpoint-service:
    build:
      context: ..
      dockerfile: backend/endpoint-service/Dockerfile
    environment:
      <<: *obs-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:8083
      GATEWAY_URL: http://api-gateway:8080
      PULSE_CA_ENABLED: "true"
      PULSE_CA_URL: http://ca-service:8089
      TURN_SECRET: ${TURN_SECRET}
      TURN_URLS: ${TURN_URLS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      PULSE_API_URL: ${PULSE_API_URL}
    networks:
      - private
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  metric-service:
    build:
      context: ..
      dockerfile: backend/metric-service/Dockerfile
    environment:
      <<: *obs-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  commands-service:
    build:
      context: ..
      dockerfile: backend/commands-service/Dockerfile
    environment:
      <<: *obs-env
      SERVICE_PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_URL: http://api-gateway:8080
      SCRIPT_SERVICE_BASE_URL: http://commands-service:8084
      SCRIPT_SECRET_KEK: ${SCRIPT_SECRET_KEK}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  alert-service:
    build:
      context: ..
      dockerfile: backend/alert-service/Dockerfile
    environment:
      <<: *obs-env
      SERVICE_PORT: 8087
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ..
      dockerfile: backend/audit-service/Dockerfile
    environment:
      <<: *obs-env
      SERVICE_PORT: 8088
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - private
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  integration-service:
    build:
      context: ..
      dockerfile: backend/integration-service/Dockerfile
    environment:
      <<: *obs-env
      SERVICE_PORT: 8091
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WEBHOOK_SECRET_KEK: ${WEBHOOK_SECRET_KEK}
    networks:
      - private
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  ca-service:
    build:
      context: ..
      dockerfile: backend/ca-service/Dockerfile
    environment:
      <<: *obs-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CA_ROOT_KEY_SECRET: ${CA_ROOT_KEY_SECRET}
    networks:
      - private
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8089/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 40s
    depends_on:
      <<: *app-deps

  prometheus:
    image: docker.io/prom/prometheus:v2.55.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus_data:/prometheus
    networks:
      - private
    ports:
      - "9095:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

  tempo:
    image: docker.io/grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro,Z
      - tempo_data:/var/tempo
    networks:
      - private
    ports:
      - "3200:3200"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  loki:
    image: docker.io/grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro,Z
      - loki_data:/loki
    networks:
      - private
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: docker.io/grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro,Z
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro,Z
      - grafana_data:/var/lib/grafana
    networks:
      - private
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy

  coturn:
    image: docker.io/coturn/coturn:4.6.2
    command: >-
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=pulse.local
      --no-tls
      --no-dtls
      --min-port=49152
      --max-port=49200
    networks:
      - public
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"

  nginx:
    image: docker.io/library/nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks:
      - public
      - gateway
    ports:
      - "8080:80"
      - "9090:9090"
    depends_on:
      api-gateway:
        condition: service_healthy

  postgres:
    image: docker.io/timescale/timescaledb:2.14.1-pg16
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 3

  redis:
    image: docker.io/library/redis:7.0-alpine
    volumes:
      - redis_data:/data
    networks:
      - private
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3

  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      HOME: /tmp
    networks:
      - private
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
    volumes:
      - minio_data:/data
    networks:
      - private
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 3

  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - private
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASSWORD &&
      mc mb --ignore-existing local/pulse-agent-binaries &&
      mc anonymous set download local/pulse-agent-binaries &&
      mc cors set local/pulse-agent-binaries --allowed-origin '*' --allowed-method 'PUT,GET' --allowed-header '*'
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  api_gateway_tls:
  prometheus_data:
  loki_data:
  grafana_data:
  tempo_data:
