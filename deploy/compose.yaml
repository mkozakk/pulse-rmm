x-app-deps: &app-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  minio:
    condition: service_healthy

services:
  api-gateway:
    build:
      context: ..
      dockerfile: backend/api-gateway/Dockerfile
    environment:
      PULSE_COOKIE_SECURE: "false"
      IDENTITY_SERVICE_URL: http://identity-service:8083
      ENROLMENT_SERVICE_URL: http://enrolment-service:8081
      METRIC_SERVICE_URL: http://metric-service:8082
      SCRIPT_SERVICE_URL: http://script-service:8084
      SOFTWARE_SERVICE_URL: http://software-service:8085
      REMOTE_SERVICE_URL: http://remote-service:8092
      ALERT_SERVICE_URL: http://alert-service:8087
      AUDIT_SERVICE_URL: http://audit-service:8088
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      identity-service:
        condition: service_healthy
      enrolment-service:
        condition: service_healthy
      metric-service:
        condition: service_healthy
      script-service:
        condition: service_healthy
      software-service:
        condition: service_healthy
      remote-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      <<: *app-deps

  identity-service:
    build:
      context: ..
      dockerfile: backend/identity-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  enrolment-service:
    build:
      context: ..
      dockerfile: backend/enrolment-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8081:8081"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  metric-service:
    build:
      context: ..
      dockerfile: backend/metric-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8082:8082"
      - "9092:9092"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  script-service:
    build:
      context: ..
      dockerfile: backend/script-service/Dockerfile
    environment:
      SERVICE_PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_URL: http://api-gateway:8080
      SCRIPT_SERVICE_BASE_URL: http://script-service:8084
      SCRIPT_SECRET_KEK: ${SCRIPT_SECRET_KEK}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  software-service:
    build:
      context: ..
      dockerfile: backend/software-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:8083
      GATEWAY_SERVICE_URL: http://api-gateway:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  remote-service:
    build:
      context: ..
      dockerfile: backend/remote-service/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      IDENTITY_SERVICE_URL: http://identity-service:8083
      GATEWAY_URL: http://api-gateway:8080
      TURN_SECRET: ${TURN_SECRET}
      TURN_URLS: ${TURN_URLS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8092/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  alert-service:
    build:
      context: ..
      dockerfile: backend/alert-service/Dockerfile
    environment:
      SERVICE_PORT: 8087
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ..
      dockerfile: backend/audit-service/Dockerfile
    environment:
      SERVICE_PORT: 8088
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    depends_on:
      <<: *app-deps

  coturn:
    image: docker.io/coturn/coturn:4.6.2
    command: >-
      -n
      --log-file=stdout
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=pulse.local
      --no-tls
      --no-dtls
      --min-port=49152
      --max-port=49200
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"

  webapp:
    profiles: ["webapp"]
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_started

  postgres:
    image: docker.io/timescale/timescaledb:2.14.1-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 2s
      retries: 3

  redis:
    image: docker.io/library/redis:7.0-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3

  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      HOME: /tmp
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
