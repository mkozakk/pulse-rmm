events {}

http {
    upstream api_gateway { server api-gateway:8080; }
    upstream agent_hub { server agent-hub:8092; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        client_max_body_size 200m;

        # WebSocket endpoints (remote shell, desktop signalling) — served by agent-hub
        location /ws/ {
            proxy_pass http://agent_hub;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_buffering off;
        }

        # File browser — served by agent-hub (holds agent streams)
        location /api/files/ {
            proxy_pass http://agent_hub;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # Server-Sent Events (alert stream etc.) — long-lived, no buffering
        location ~* /api/.*/stream$ {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection '';
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            proxy_buffering off;
            proxy_cache off;
        }

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}

# TCP passthrough so TLS goes end-to-end between agent and agent-hub
stream {
    server {
        listen 9090;
        proxy_pass agent-hub:9090;
    }
}
