# Override for e2e runs:
# - Uses different ports so dev and e2e stacks can run simultaneously
# - Uses isolated volumes so e2e doesn't affect dev data
#
# Usage:  podman compose -f deploy/compose.yaml -f deploy/compose.e2e.yaml up -d
# Dev runs concurrently on 8080, e2e tests run on 8081
# Teardown: podman compose -f deploy/compose.yaml -f deploy/compose.e2e.yaml down -v

services:
  agent-e2e:
    build:
      context: ..
      dockerfile: agent/Dockerfile
    environment:
      API_URL: http://nginx
      GRPC_ADDR: 127.0.0.1:9090
      TLS_ENABLED: ${PULSE_MTLS_ENABLED:-false}
    volumes:
      - agent_e2e_data:/var/lib/pulse-agent
      - agent_e2e_config:/etc/pulse-agent
    networks:
      - public
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped

  coturn:
    ports:
      - "3479:3478/udp"
      - "3479:3478/tcp"
      - "49153-49201:49152-49200/udp"

  nginx:
    ports:
      - "8081:80"
      - "9091:9090"

  postgres:
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis_e2e_data:/data

  rabbitmq:
    volumes:
      - rabbitmq_e2e_data:/var/lib/rabbitmq

  minio:
    volumes:
      - minio_e2e_data:/data

  api-gateway:
    volumes:
      - api_gateway_tls_e2e:/var/lib/api-gateway/tls

volumes:
  postgres_e2e_data:
  redis_e2e_data:
  rabbitmq_e2e_data:
  minio_e2e_data:
  api_gateway_tls_e2e:
  agent_e2e_data:
  agent_e2e_config:
