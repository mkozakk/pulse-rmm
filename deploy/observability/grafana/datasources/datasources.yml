apiVersion: 1

datasources:
  - name: Prometheus
    uid: pulse-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    uid: pulse-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          datasourceUid: pulse-tempo
          url: '$${__value.raw}'
  - name: Tempo
    uid: pulse-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: pulse-loki
        tags:
          - key: service.name
            value: service
      serviceMap:
        datasourceUid: pulse-prometheus
