# Production overrides for compose.yaml.
#
# Usage:  podman compose -f deploy/compose.yaml -f deploy/compose.prod.yaml up -d
#
# What this changes vs. dev:
#   - SPRING_PROFILES_ACTIVE=prod,loki  (no debug, no swagger, no SQL logging)
#   - PULSE_COOKIE_SECURE=true          (cookies only over HTTPS)
#   - PULSE_MTLS_ENABLED=true           (agent <-> gateway mTLS required)
#   - SWAGGER_UI_ENABLED=false          (API docs disabled)
#   - No host-exposed service ports     (nginx is the only entry point)
#   - No host-exposed dependency ports  (postgres, redis, rabbit, minio, coturn internal only)
#   - No Grafana / Prometheus / Loki / Tempo ports exposed

x-prod-env: &prod-env
  SPRING_PROFILES_ACTIVE: prod,loki

services:
  api-gateway:
    environment:
      <<: *prod-env
      PULSE_COOKIE_SECURE: "true"
      SWAGGER_UI_ENABLED: "false"
    ports: !override []

  agent-hub:
    environment:
      <<: *prod-env
      PULSE_MTLS_ENABLED: "true"
      SWAGGER_UI_ENABLED: "false"
    ports: !override []

  rbac-service:
    environment:
      <<: *prod-env
      SWAGGER_UI_ENABLED: "false"
    ports: !override []

  keycloak:
    # production server instead of start-dev; TLS terminated by nginx in front
    command: start --import-realm
    environment:
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports: !override []

  endpoint-service:
    environment: { <<: *prod-env, SWAGGER_UI_ENABLED: "false" }
    ports: !override []

  metric-service:
    environment: { <<: *prod-env, SWAGGER_UI_ENABLED: "false" }
    ports: !override []

  commands-service:
    environment: *prod-env
    ports: !override []

  alert-service:
    environment: *prod-env
    ports: !override []

  audit-service:
    environment: *prod-env
    ports: !override []

  integration-service:
    environment: *prod-env
    ports: !override []

  ca-service:
    environment: *prod-env
    ports: !override []

  nginx:
    volumes: !override
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro,Z
    ports: !override
      - "8082:80"
      - "8443:443"

  coturn:
    ports: !override []

  postgres:
    ports: !override []

  redis:
    ports: !override []

  rabbitmq:
    ports: !override []

  minio:
    ports: !override []

  loki:
    ports: !override []

  tempo:
    ports: !override []

  prometheus:
    ports: !override []

  grafana:
    ports: !override []
