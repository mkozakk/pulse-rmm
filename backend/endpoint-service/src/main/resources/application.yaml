server:
  port: 8081
  tomcat:
    max-http-form-post-size: -1

grpc:
  server:
    port: -1

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/pulse-rmm/protocol/openid-connect/certs
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pulse-rmm}
  application:
    name: endpoint-service
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

pulse:
  identity:
    url: ${RBAC_SERVICE_URL:http://rbac-service:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production}
  api:
    url: ${PULSE_API_URL:http://localhost:8080}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: pulse-agent-binaries
  turn:
    secret: ${TURN_SECRET:change-me-in-production-set-TURN_SECRET-env-var}
    urls: ${TURN_URLS:turn:localhost:3478}
  gateway:
    url: ${GATEWAY_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: endpoint-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
