server:
  port: 8089

spring:
  application:
    name: ca-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
  flyway:
    enabled: true
    schemas: ca
    default-schema: ca
    create-schemas: true
    locations: classpath:db/migration/ca
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ca
    open-in-view: false

pulse:
  ca:
    root-key-encryption-secret: ${CA_ROOT_KEY_SECRET:change-me-in-production-use-real-kms-instead}
    cert-ttl: ${CA_CERT_TTL:PT24H}
    root-cn: ${CA_ROOT_CN:Pulse RMM Root CA}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ca-service
