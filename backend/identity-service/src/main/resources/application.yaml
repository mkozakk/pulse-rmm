server:
  port: 8083

spring:
  application:
    name: identity-service
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: identity
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity
    default-schema: identity

pulse:
  internal:
    secret: ${INTERNAL_API_SECRET}
  jwt:
    secret: ${JWT_SECRET}
    issuer: pulse-rmm
    access-ttl: PT15M
    refresh-ttl: P7D
    cookie-secure: ${PULSE_COOKIE_SECURE:true}
    bcrypt-strength: 12

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: identity-service

springdoc:
  api-docs:
    path: /v3/api-docs
  paths-to-exclude: /internal/**
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
