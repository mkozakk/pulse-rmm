server:
  port: 8083

spring:
  application:
    name: identity-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/pulse
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

pulse:
  jwt:
    secret: ${JWT_SECRET}
    issuer: pulse-rmm
    access-ttl: PT15M
    refresh-ttl: P7D
    cookie-secure: ${PULSE_COOKIE_SECURE:false}
    bcrypt-strength: 12

management:
  endpoints:
    web:
      exposure:
        include: health
