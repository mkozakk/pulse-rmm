spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///pulse?TC_TMPFS=/var/lib/postgresql/data:rw
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: identity
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity
    default-schema: identity

pulse:
  jwt:
    secret: this-is-a-32-byte-test-secret-!!
    bcrypt-strength: 4
