spring:
  application:
    name: remote-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: remote
  flyway:
    enabled: true
    baselineOnMigrate: true
    locations: classpath:db/migration
    schemas: remote
    default-schema: remote
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}
  turn:
    secret: ${TURN_SECRET:change-me-in-production-set-TURN_SECRET-env-var}
    urls: ${TURN_URLS:turn:localhost:3478}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me}
  gateway:
    url: ${GATEWAY_URL:http://localhost:8080}

server:
  port: ${SERVICE_PORT:8092}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
