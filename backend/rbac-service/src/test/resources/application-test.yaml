spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///pulse?TC_TMPFS=/var/lib/postgresql/data:rw
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: rbac
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: rbac
    default-schema: rbac
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/pulse-rmm
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672

keycloak:
  url: http://localhost:9999
  admin:
    username: admin
    password: admin

pulse:
  internal:
    secret: test-internal-secret
