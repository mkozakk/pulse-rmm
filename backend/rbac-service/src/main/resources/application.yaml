server:
  port: 8083

spring:
  application:
    name: rbac-service
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: rbac
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: rbac
    default-schema: rbac
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/pulse-rmm/protocol/openid-connect/certs
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/pulse-rmm}

pulse:
  internal:
    secret: ${INTERNAL_API_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: rbac-service

springdoc:
  api-docs:
    path: /v3/api-docs
  paths-to-exclude: /internal/**
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
