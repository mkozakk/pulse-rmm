spring:
  application:
    name: alert-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: alerts
  flyway:
    enabled: true
    baselineOnMigrate: true
    locations: classpath:db/migration
    schemas: alerts
    default-schema: alerts
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}

server:
  port: ${SERVICE_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
