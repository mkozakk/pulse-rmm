server:
  port: 8080

grpc:
  server:
    port: 9090

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/api/auth/**
          - id: enrolment
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/enrolment/**
          - id: endpoint-metrics
            uri: ${METRIC_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/endpoints/*/metrics
          - id: groups
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/groups/**
          - id: tag-rules
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/tag-rules/**
          - id: endpoints
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/endpoints/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:5173"
            allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://identity-service:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production-set-INTERNAL_API_SECRET-env-var}

management:
  endpoints:
    web:
      exposure:
        include: health
