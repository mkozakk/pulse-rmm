server:
  port: 8080

grpc:
  server:
    port: 9090

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/api/auth/**,/api/identity/**
          - id: enrolment
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/enrolment/**
          - id: endpoint-metrics
            uri: ${METRIC_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/endpoints/*/metrics
          - id: software
            uri: ${SOFTWARE_SERVICE_URL:http://localhost:8085}
            predicates:
              - Path=/api/endpoints/*/software/**
          - id: groups
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/groups/**
          - id: tag-rules
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/tag-rules/**
          - id: endpoints
            uri: ${ENROLMENT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/endpoints/**
          - id: scripts
            uri: ${SCRIPT_SERVICE_URL:http://localhost:8084}
            predicates:
              - Path=/api/scripts/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:5173"
            allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://identity-service:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production-set-INTERNAL_API_SECRET-env-var}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    urls:
      - name: Identity
        url: http://localhost:8083/v3/api-docs
      - name: Enrolment
        url: http://localhost:8081/v3/api-docs
      - name: Metrics
        url: http://localhost:8082/v3/api-docs
      - name: Scripts
        url: http://localhost:8084/v3/api-docs
      - name: Software
        url: http://localhost:8085/v3/api-docs
    urls-primary-name: Identity
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
