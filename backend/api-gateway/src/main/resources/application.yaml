server:
  port: 8080
  tomcat:
    max-http-form-post-size: -1

grpc:
  server:
    port: 9090

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/api/auth/**,/api/identity/**
          - id: enrolment
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/enrolment/**
          - id: endpoint-metrics
            uri: ${METRIC_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/endpoints/*/metrics
          - id: software
            uri: ${COMMANDS_SERVICE_URL:http://localhost:8084}
            predicates:
              - Path=/api/endpoints/*/software/**
          - id: groups
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/groups/**
          - id: tag-rules
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/tag-rules/**
          - id: endpoints
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/endpoints/**
          - id: scripts
            uri: ${COMMANDS_SERVICE_URL:http://localhost:8084}
            predicates:
              - Path=/api/scripts/**
          - id: sessions
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/sessions/**
          - id: alerts
            uri: ${ALERT_SERVICE_URL:http://localhost:8087}
            predicates:
              - Path=/api/alert-rules/**,/api/alerts/**
          - id: audit
            uri: ${AUDIT_SERVICE_URL:http://localhost:8088}
            predicates:
              - Path=/api/audit/**
          - id: agent-versions
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/agent-versions/**,/api/updates/**
          - id: install-packages
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/install/pulse-agent.deb,/install/pulse-agent.rpm,/install/pulse-agent-linux-amd64.tar.gz,/install/pulse-agent-windows-amd64.zip,/install/pulse-agent-installer.exe
          - id: install-scripts
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/install/**
          - id: webhooks
            uri: ${INTEGRATION_SERVICE_URL:http://localhost:8091}
            predicates:
              - Path=/api/webhooks/**

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://identity-service:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production-set-INTERNAL_API_SECRET-env-var}
  mtls:
    enabled: ${PULSE_MTLS_ENABLED:false}
    cert-dir: ${PULSE_MTLS_CERT_DIR:/var/lib/api-gateway/tls}
    gateway-cn: ${PULSE_MTLS_GATEWAY_CN:api-gateway}
    gateway-sans: ${PULSE_MTLS_GATEWAY_SANS:api-gateway,localhost,127.0.0.1}
  ca:
    url: ${PULSE_CA_URL:http://ca-service:8089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: api-gateway

springdoc:
  api-docs:
    enabled: ${SWAGGER_UI_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html
