server:
  port: 8080
  tomcat:
    max-http-form-post-size: -1

grpc:
  server:
    port: 9090

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  cloud:
    gateway:
      mvc:
        routes:
          - id: identity
            uri: ${IDENTITY_SERVICE_URL:http://localhost:8083}
            predicates:
              - Path=/api/auth/**,/api/identity/**
          - id: enrolment
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/enrolment/**
          - id: endpoint-metrics
            uri: ${METRIC_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/endpoints/*/metrics
          - id: software
            uri: ${SOFTWARE_SERVICE_URL:http://localhost:8085}
            predicates:
              - Path=/api/endpoints/*/software/**
          - id: groups
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/groups/**
          - id: tag-rules
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/tag-rules/**
          - id: endpoints
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/endpoints/**
          - id: scripts
            uri: ${SCRIPT_SERVICE_URL:http://localhost:8084}
            predicates:
              - Path=/api/scripts/**
          - id: sessions
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/sessions/**
          - id: alerts
            uri: ${ALERT_SERVICE_URL:http://localhost:8087}
            predicates:
              - Path=/api/alert-rules/**,/api/alerts/**
          - id: audit
            uri: ${AUDIT_SERVICE_URL:http://localhost:8088}
            predicates:
              - Path=/api/audit/**
          - id: agent-versions
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/agent-versions/**,/api/updates/**
          - id: install-packages
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/install/pulse-agent.deb,/install/pulse-agent.rpm,/install/pulse-agent-linux-amd64.tar.gz,/install/pulse-agent-windows-amd64.zip,/install/pulse-agent-installer.exe
          - id: install-scripts
            uri: ${ENDPOINT_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/install/**
          - id: webhooks
            uri: ${INTEGRATION_SERVICE_URL:http://localhost:8091}
            predicates:
              - Path=/api/webhooks/**

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-set-JWT_SECRET-env-var}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://identity-service:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production-set-INTERNAL_API_SECRET-env-var}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud.gateway: DEBUG
    dev.pulsermm.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    urls:
      - name: Identity
        url: http://localhost:8083/v3/api-docs
      - name: Endpoints
        url: http://localhost:8081/v3/api-docs
      - name: Metrics
        url: http://localhost:8082/v3/api-docs
      - name: Scripts
        url: http://localhost:8084/v3/api-docs
      - name: Software
        url: http://localhost:8085/v3/api-docs
      - name: Alerts
        url: http://localhost:8087/v3/api-docs
      - name: Audit
        url: http://localhost:8088/v3/api-docs
      - name: Integrations
        url: http://localhost:8091/v3/api-docs
    urls-primary-name: Identity
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
