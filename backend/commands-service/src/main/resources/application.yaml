spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080/auth}/realms/pulse-rmm/protocol/openid-connect/certs
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/auth/realms/pulse-rmm}
  application:
    name: commands-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: scripts,software
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

pulse:
  agent-hub:
    url: ${AGENT_HUB_URL:http://localhost:8092}
  script:
    base-url: ${SCRIPT_SERVICE_BASE_URL:http://localhost:8084}
    secret-kek: ${SCRIPT_SECRET_KEK:change-me-in-production-set-SCRIPT_SECRET_KEK-env-var}

server:
  port: ${SERVICE_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: commands-service
