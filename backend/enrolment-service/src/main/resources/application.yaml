server:
  port: 8081

grpc:
  server:
    port: -1

spring:
  application:
    name: enrolment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: enrolment
    open-in-view: false
  web:
    cors:
      allowed-origins: "http://localhost:8080"
      allowed-methods: GET, POST, PUT, DELETE, OPTIONS
      allowed-headers: "*"
      allow-credentials: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: enrolment
    default-schema: enrolment

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production}
  api:
    url: ${PULSE_API_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
