server:
  port: 8081

grpc:
  server:
    port: 9091

spring:
  application:
    name: enrolment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: enrolment
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: enrolment
    default-schema: enrolment

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
