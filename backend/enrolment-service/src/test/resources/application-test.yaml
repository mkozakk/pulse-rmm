grpc:
  server:
    port: 9091

spring:
  datasource:
    url: jdbc:tc:postgresql:16:///pulse
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: enrolment
  flyway:
    schemas: enrolment
    default-schema: enrolment

pulse:
  jwt:
    secret: test-secret-key-that-is-long-enough-for-hs256-signature
