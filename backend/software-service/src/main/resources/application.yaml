server:
  port: 8085

spring:
  application:
    name: software-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/${POSTGRES_DB:pulse}
    username: ${POSTGRES_USER:pulse}
    password: ${POSTGRES_PASSWORD:pulse}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.default_schema: software
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: software
    default-schema: software

pulse:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8083}
    internal-secret: ${INTERNAL_API_SECRET:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health
