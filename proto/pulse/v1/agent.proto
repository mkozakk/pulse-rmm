syntax = "proto3";

package pulse.v1;

option java_multiple_files = true;
option java_outer_classname = "AgentProto";
option java_package = "dev.pulsermm.proto.v1";
option go_package = "github.com/pulsermm/pulse-rmm/agent/gen/pulse/v1;pulsev1";

service AgentService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Enrol(EnrolRequest) returns (EnrolResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatOk);
  rpc PushSoftwareList(SoftwareList) returns (Ack);
  rpc RenewCert(RenewCertRequest) returns (RenewCertResponse);
}

service MetricService {
  rpc PushMetrics(MetricBatch) returns (Ack);
  rpc ReportSystemInfo(SystemInfo) returns (Ack);
}

message PingRequest {}

message PingResponse {
  string status = 1;
}

message EnrolRequest {
  string token      = 1;
  bytes  public_key = 2;
  string hostname   = 3;
  string os         = 4;
  string arch       = 5;
  string csr_pem    = 6;
}

message EnrolResponse {
  string endpoint_id        = 1;
  bytes  backend_public_key = 2;
  bytes  client_cert_pem    = 3;
  bytes  ca_cert_pem        = 4;
}

message HeartbeatRequest {
  string endpoint_id = 1;
}

message HeartbeatOk {}

message MetricSample {
  string type                = 1;
  double value               = 2;
  int64  collected_at        = 3;
  map<string, string> labels = 4;
}

message MetricBatch {
  string endpoint_id            = 1;
  repeated MetricSample samples = 2;
}

message CpuInfo {
  string model          = 1;
  int32  physical_cores = 2;
  int32  logical_cores  = 3;
  double frequency_mhz  = 4;
}

message MemoryInfo {
  uint64 total_bytes      = 1;
  uint64 swap_total_bytes = 2;
}

message DiskInfo {
  string device      = 1;
  string mountpoint  = 2;
  string fstype      = 3;
  uint64 total_bytes = 4;
}

message NicInfo {
  string name              = 1;
  string mac               = 2;
  repeated string addresses = 3;
  uint32 mtu               = 4;
}

message SystemInfo {
  string endpoint_id       = 1;
  CpuInfo cpu              = 2;
  MemoryInfo memory        = 3;
  repeated DiskInfo disks  = 4;
  repeated NicInfo nics    = 5;
  int64 collected_at       = 6;
}

message Ack {}

message RenewCertRequest {
  string csr_pem = 1;
}

message RenewCertResponse {
  bytes client_cert_pem = 1;
  bytes ca_cert_pem     = 2;
}

message SoftwareItem {
  string name      = 1;
  string version   = 2;
  string source    = 3;
  string id        = 4;
  string update_to = 5;
  bool   is_store  = 6;
}

message SoftwareList {
  string endpoint_id           = 1;
  repeated SoftwareItem items  = 2;
}
