syntax = "proto3";

package pulse.v1;

option java_multiple_files = true;
option java_outer_classname = "AgentProto";
option java_package = "dev.pulsermm.proto.v1";
option go_package = "github.com/pulsermm/pulse-rmm/agent/gen/pulse/v1;pulsev1";

// Placeholder service — expanded from sprint 2 onward.
service AgentService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {}

message PingResponse {
  string status = 1;
}
