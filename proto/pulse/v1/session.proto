syntax = "proto3";

package pulse.v1;

option java_multiple_files = true;
option java_outer_classname = "SessionProto";
option java_package = "dev.pulsermm.proto.v1";
option go_package = "github.com/pulsermm/pulse-rmm/agent/gen/pulse/v1;pulsev1";

message StartDesktopSessionCommand {
  string          session_id  = 1;
  repeated string turn_urls   = 2;
  string          turn_secret = 3;
}

message EndDesktopSessionCommand {
  string session_id = 1;
}

// Carries SDP offer/answer or an ICE candidate. Used in both directions.
message DesktopSignalMessage {
  string session_id = 1;
  string type       = 2; // "offer" | "answer" | "candidate"
  string payload    = 3;
}

message SessionReadyEvent {
  string session_id = 1;
  string error      = 2; // non-empty if session could not start, e.g. "wayland_not_supported"
}
