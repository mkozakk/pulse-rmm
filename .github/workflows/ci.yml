name: CI - Build, Lint & Test

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  proto:
    name: Protobuf (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.39.0'
      - name: Lint proto files
        run: cd proto && buf lint

  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.39.0'

      - name: Generate proto stubs
        run: cd proto && buf generate

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, Lint & Test backend
        run: cd backend && mvn verify

  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.39.0'

      - name: Generate proto stubs
        run: cd proto && buf generate

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.58
          working-directory: agent

      - name: Test agent
        run: cd agent && go test -v ./...

      - name: Build agent
        run: cd agent && go build ./...

  webapp:
    name: Webapp (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: cd webapp && npm ci

      - name: Lint webapp
        run: cd webapp && npm run lint --if-present

      - name: Test webapp
        run: cd webapp && npm run test --if-present

      - name: Build webapp
        run: cd webapp && npm run build
